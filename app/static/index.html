<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
        }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        p.sub { color: #94a3b8; margin-bottom: 2rem; }
        .input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid #334155;
            border-radius: 8px;
            background: #1e293b;
            color: #e2e8f0;
            font-size: 1rem;
            outline: none;
        }
        input:focus { border-color: #3b82f6; }
        button {
            padding: 0.75rem 1.5rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }
        button:hover { background: #2563eb; }
        .result {
            display: none;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
        }
        .result a {
            color: #3b82f6;
            text-decoration: none;
            font-size: 1.1rem;
            word-break: break-all;
        }
        .result a:hover { text-decoration: underline; }
        .copy-btn {
            margin-top: 0.5rem;
            padding: 0.4rem 1rem;
            font-size: 0.85rem;
            background: #334155;
        }
        .copy-btn:hover { background: #475569; }
        .error { color: #f87171; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>URL Shortener</h1>
        <p class="sub">Pega tu URL larga y obtén un enlace corto</p>
        <div class="input-group">
            <input type="url" id="urlInput" placeholder="https://ejemplo.com/url-muy-larga">
            <button onclick="shorten()">Acortar</button>
        </div>
        <div class="result" id="result">
            <p>Tu URL corta:</p>
            <a id="shortUrl" href="#" target="_blank"></a>
            <br>
            <button class="copy-btn" onclick="copyUrl()">Copiar</button>
        </div>
        <p class="error" id="error"></p>
    </div>

    <script>
        async function shorten() {
            const url = document.getElementById('urlInput').value;
            const error = document.getElementById('error');
            const result = document.getElementById('result');
            error.textContent = '';
            result.style.display = 'none';

            if (!url) { error.textContent = 'Ingresa una URL'; return; }

            try {
                const res = await fetch('/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await res.json();
                const link = document.getElementById('shortUrl');
                link.href = data.short_url;
                link.textContent = data.short_url;
                result.style.display = 'block';
            } catch (e) {
                error.textContent = 'Error al acortar la URL';
            }
        }

        function copyUrl() {
            const url = document.getElementById('shortUrl').textContent;
            navigator.clipboard.writeText(url);
            document.querySelector('.copy-btn').textContent = '¡Copiado!';
            setTimeout(() => document.querySelector('.copy-btn').textContent = 'Copiar', 2000);
        }

        document.getElementById('urlInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') shorten();
        });
    </script>
</body>
</html>
