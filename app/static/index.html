<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
        }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        p.sub { color: #94a3b8; margin-bottom: 2rem; }
        .input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid #334155;
            border-radius: 8px;
            background: #1e293b;
            color: #e2e8f0;
            font-size: 1rem;
            outline: none;
        }
        input:focus { border-color: #3b82f6; }
        button {
            padding: 0.75rem 1.5rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #2563eb; }

        .comparison {
            display: none;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 1.5rem;
            margin-top: 1.5rem;
            text-align: left;
        }
        .comparison.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .url-box {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            word-break: break-all;
        }
        .url-box:last-child { margin-bottom: 0; }

        .url-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .label-original { color: #f87171; }
        .label-short { color: #34d399; }

        .url-text-original {
            color: #94a3b8;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .url-text-short {
            color: #34d399;
            font-size: 1.2rem;
            font-weight: 600;
        }
        .url-text-short a {
            color: #34d399;
            text-decoration: none;
        }
        .url-text-short a:hover { text-decoration: underline; }

        .arrow {
            text-align: center;
            font-size: 1.5rem;
            margin: 0.75rem 0;
            color: #3b82f6;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #334155;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: #3b82f6;
        }
        .stat-label {
            font-size: 0.7rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .copy-btn {
            flex: 1;
            padding: 0.6rem 1rem;
            font-size: 0.85rem;
            background: #334155;
        }
        .copy-btn:hover { background: #475569; }
        .new-btn {
            flex: 1;
            padding: 0.6rem 1rem;
            font-size: 0.85rem;
            background: transparent;
            border: 1px solid #334155;
            color: #94a3b8;
        }
        .new-btn:hover { background: #1e293b; }

        .error { color: #f87171; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>URL Shortener</h1>
        <p class="sub">Pega tu URL larga y obtén un enlace corto</p>
        <div class="input-group">
            <input type="url" id="urlInput" placeholder="https://ejemplo.com/url-muy-larga-que-quieres-acortar">
            <button onclick="shorten()" id="shortenBtn">Acortar</button>
        </div>

        <div class="comparison" id="comparison">
            <div class="url-box">
                <div class="url-label label-original">🔗 URL Original</div>
                <div class="url-text-original" id="originalUrl"></div>
            </div>

            <div class="arrow">↓</div>

            <div class="url-box">
                <div class="url-label label-short">✂️ URL Corta</div>
                <div class="url-text-short">
                    <a id="shortUrl" href="#" target="_blank"></a>
                </div>
            </div>

            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="originalLength">0</div>
                    <div class="stat-label">Caracteres original</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="shortLength">0</div>
                    <div class="stat-label">Caracteres corta</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="savedPercent">0%</div>
                    <div class="stat-label">Reducción</div>
                </div>
            </div>

            <div class="actions">
                <button class="copy-btn" onclick="copyUrl()">Copiar URL corta</button>
                <button class="new-btn" onclick="reset()">Nueva URL</button>
            </div>
        </div>

        <p class="error" id="error"></p>
    </div>

    <script>
        async function shorten() {
            const url = document.getElementById('urlInput').value.trim();
            const error = document.getElementById('error');
            const comparison = document.getElementById('comparison');
            error.textContent = '';
            comparison.classList.remove('show');

            if (!url) { error.textContent = 'Ingresa una URL'; return; }

            const btn = document.getElementById('shortenBtn');
            btn.textContent = '...';
            btn.disabled = true;

            try {
                const res = await fetch('/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await res.json();

                document.getElementById('originalUrl').textContent = url;
                const link = document.getElementById('shortUrl');
                link.href = data.short_url;
                link.textContent = data.short_url;

                document.getElementById('originalLength').textContent = url.length;
                document.getElementById('shortLength').textContent = data.short_url.length;
                const saved = Math.round((1 - data.short_url.length / url.length) * 100);
                document.getElementById('savedPercent').textContent = (saved > 0 ? saved : 0) + '%';

                comparison.classList.add('show');
            } catch (e) {
                error.textContent = 'Error al acortar la URL';
            } finally {
                btn.textContent = 'Acortar';
                btn.disabled = false;
            }
        }

        function copyUrl() {
            const url = document.getElementById('shortUrl').textContent;
            navigator.clipboard.writeText(url);
            const btn = document.querySelector('.copy-btn');
            btn.textContent = '¡Copiado!';
            setTimeout(() => btn.textContent = 'Copiar URL corta', 2000);
        }

        function reset() {
            document.getElementById('urlInput').value = '';
            document.getElementById('comparison').classList.remove('show');
            document.getElementById('urlInput').focus();
        }

        document.getElementById('urlInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') shorten();
        });
    </script>
</body>
</html>
